baseURL = 'https://blog.caihongtu.top/'
languageCode = 'zh-CN'
title = '彩虹兔的博客'
theme = "github.com/D-Sketon/hugo-theme-reimu"

defaultContentLanguage = 'zh-CN'
[languages]
    [languages.zh-CN]
        languageName = '简体中文'
        weight = 1
        hasCJKLanguage = true
        [languages.zh-CN.params]
            # 网站全局描述（会自动注入到<meta name="description">）
            description = "彩虹兔的博客 - 分享技术干货、游戏文娱内容、生活感悟和有趣的小事 | 抖音博主彩虹兔 | 哔哩哔哩b站博主彩虹兔呀"
            [languages.zh-CN.params.injector]
                head_begin = '''
                    <!-- 必应验证 -->
                    <meta name="msvalidate.01" content="C9E9E9B01059D532F0C96A2C003BA4F5" />
                    <!-- 百度验证 -->
                    <meta name="baidu-site-verification" content="codeva-UjY7qemTE2" />
                    <!-- 谷歌验证 -->
                    <meta name="google-site-verification" content="zzUCXRBNOkMZmbakgVfhiTf5GOtL26t8k0L8JnWYDIs" />
                    <!-- 搜狗验证 -->
                    <meta name="sogou_site_verification" content="gO3VyQGRoM" />
                    <!-- 360验证 -->
                    <meta name="360-site-verification" content="f035df54f8608e06f8c1544f32b91670" />
                '''

[outputs]
    home = ["Algolia", "HTML", "RSS"]

[outputFormats.Algolia]
    baseName = "algolia"
    isPlainText = true
    mediaType = "application/json"
    notAlternative = true

[markup]
    [markup.highlight]
        guessSyntax = true
        noClasses = false
    [markup.goldmark]
        [markup.goldmark.extensions]
            [markup.goldmark.extensions.passthrough]
                enable = true
                delimiters.block = [["\\[", "\\]"], ["$$", "$$"]]
                delimiters.inline = [["\\(", "\\)"], ["$", "$"]]
        [markup.goldmark.renderer]
        unsafe = true
[module]
    [module.imports]
        path = "github.com/D-Sketon/hugo-theme-reimu"
    # 主题要求 Hugo Extended 版本，最低 0.124.0
    [module.hugoVersion]
        extended = true
        min = "0.124.0"