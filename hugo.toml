baseURL = 'https://blog.caihongtu.top/'
languageCode = 'zh-CN'
title = '彩虹兔的博客'
theme = "github.com/D-Sketon/hugo-theme-reimu"

defaultContentLanguage = 'zh-CN'
[languages]
    [languages.zh-CN]
        languageName = '简体中文'
        weight = 1
        hasCJKLanguage = true

[outputs]
    home = ["Algolia", "HTML", "RSS"]

[outputFormats.Algolia]
    baseName = "algolia"
    isPlainText = true
    mediaType = "application/json"
    notAlternative = true

[markup]
    [markup.highlight]
        guessSyntax = true
        noClasses = false
    [markup.goldmark]
        [markup.goldmark.extensions]
            [markup.goldmark.extensions.passthrough]
                enable = true
                delimiters.block = [["\\[", "\\]"], ["$$", "$$"]]
                delimiters.inline = [["\\(", "\\)"], ["$", "$"]]
        [markup.goldmark.renderer]
        # 如果您在代码块内使用了原始的 HTML 标签，并且希望它们在代码块中也被“原样显示”为文本而非被忽略，
        # 您可能需要设置 unsafe = true。但请注意，这会影响整个站点的安全设置。
        # 对于**仅**在代码块内显示短代码的需求，通常不需要启用此项。
        unsafe = true